<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sistem Absensi Karyawan - Login untuk mencatat kehadiran harian Anda">
  <meta name="theme-color" content="#1a4a8a">
  <title>Login - Sistem Absensi Karyawan</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a4a8a'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'/%3E%3C/svg%3E">
</head>
<body>
  <div class="login-page" id="loginPage">
    <!-- Decorative Circles -->
    <div class="decor-circle"></div>
    <div class="decor-circle"></div>
    <div class="decor-circle"></div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
        </div>
        <h1>Sistem Absensi</h1>
        <p>Masuk untuk mencatat kehadiran Anda</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="nikInput">Nomor Induk Karyawan</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="nikInput" 
              class="form-input" 
              placeholder="Masukkan NIK Anda" 
              required 
              autocomplete="off"
              inputmode="numeric"
            >
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6v-2zm0 4h8v2H6v-2zm10 0h2v2h-2v-2zm-6-4h8v2h-8v-2z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="passwordInput">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="passwordInput" 
              class="form-input" 
              placeholder="Masukkan password" 
              required 
              autocomplete="off"
            >
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
            </svg>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" id="eyeIcon">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          <svg viewBox="0 0 24 24">
            <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
          </svg>
          <span>Masuk</span>
        </button>
      </form>

      <p class="text-center mt-2" style="font-size: 0.78rem; color: var(--text-light);">
        &copy; 2026 Sistem Absensi Karyawan
      </p>
    </div>
  </div>

  <!-- Notification Container -->
  <div class="notification-container" id="notificationContainer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <p>Memproses login...</p>
      <p class="loading-sub">Mohon tunggu sebentar</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize login page
    document.addEventListener('DOMContentLoaded', () => {
      App.initLogin();
    });
  </script>
</body>
</html>
