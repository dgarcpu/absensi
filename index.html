<!DOCTYPE html>
<html>
<head>
    <title>Absensi LevelUp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="mobile-app">
        <h2>Presensi Wajah</h2>
        <p id="status">Menginisialisasi Kamera...</p>
        
        <div class="scan-container">
            <video id="video" autoplay muted></video>
        </div>

        <div id="info-karyawan" class="card" style="color:black; display:none">
            <p id="nama-user"></p>
            <button class="btn btn-primary" onclick="submitAbsen()">Konfirmasi Hadir</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');

        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                document.getElementById('status').innerText = "Kamera Aktif. Silakan arahkan wajah.";
            } catch (err) {
                document.getElementById('status').innerText = "Kamera Gagal: " + err;
            }
        }

        // Jalankan kamera langsung
        startVideo();
    </script>
</body>
</html>
